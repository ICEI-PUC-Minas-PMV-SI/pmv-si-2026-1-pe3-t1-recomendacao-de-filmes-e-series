<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico | CineMatch</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<main>
  <div class="container">
    <div class="page" id="page"></div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/nav.js"></script>
<script>
  Nav.mount(null);

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function render() {
    const history = State.get().history;
    const ratings = State.get().ratings;
    const items = history
      .map(h => ({ ...h, t: window.CINEMATCH_DATA.TITLES_BY_ID[h.titleId], stars: ratings[h.titleId] }))
      .filter(x => x.t);

    document.getElementById('page').innerHTML = `
      <header class="page-header">
        <div class="page-greeting">
          <span class="eyebrow">Sua jornada  ·  Tudo que você assistiu</span>
          <h1 class="page-title-display">Seu <em>histórico</em></h1>
          <p class="lead" style="max-width:540px;margin-top:var(--gap-3);">
            ${items.length === 0
              ? 'Quando você avalia um título, ele entra aqui automaticamente. Comece avaliando algo.'
              : `${items.length} ${items.length === 1 ? 'título avaliado' : 'títulos avaliados'} até agora.`}
          </p>
        </div>
      </header>

      ${items.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-icon">★</div>
          <div class="empty-state-title">Histórico vazio.</div>
          <div class="empty-state-subtitle">Avalie um filme ou série para começar seu registro.</div>
          <a href="home.html" class="btn btn-primary btn-lg">Ir para o início</a>
        </div>
      ` : `
        <div style="display:flex;flex-direction:column;gap:var(--gap-3);" id="list"></div>
      `}
    `;

    if (items.length) {
      const list = document.getElementById('list');
      list.innerHTML = items.map(({ t, stars, ratedAt }) => `
        <a href="detalhes.html?id=${t.id}" class="provider-row" style="text-decoration:none;align-items:stretch;padding:var(--gap-3);">
          <div class="provider-row-left" style="gap:var(--gap-4);align-items:center;flex:1;">
            <div style="width:56px;aspect-ratio:2/3;border-radius:var(--r-sm);overflow:hidden;background:var(--ink-3);flex-shrink:0;">
              <img src="${t.poster}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
            </div>
            <div style="flex:1;">
              <div class="provider-row-name" style="font-size:18px;">${UI.escape(t.title)}</div>
              <div style="display:flex;gap:var(--gap-3);margin-top:4px;font-family:var(--font-mono);font-size:11px;color:var(--paper-mute);text-transform:uppercase;letter-spacing:0.1em;">
                <span>${t.year}</span><span>·</span>
                <span>${t.type}</span><span>·</span>
                <span>Avaliado em ${fmtDate(ratedAt)}</span>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:var(--gap-3);">
              <div class="detail-rating" style="font-size:20px;">★ ${stars}</div>
              <button class="btn btn-ghost btn-sm" data-remove="${t.id}"
                style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--paper-mute);">
                Remover
              </button>
            </div>
          </div>
        </a>
      `).join('');

      list.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = Number(btn.dataset.remove);
          const t = window.CINEMATCH_DATA.TITLES_BY_ID[id];
          const oldStars = State.get().ratings[id];
          State.removeFromHistory(id);
          UI.toast(`${t.title} removido do histórico`, {
            action: 'Desfazer',
            onAction: () => {
              if (oldStars) State.rate(id, oldStars);
              render();
            }
          });
          render();
        });
      });
    }
  }

  render();
</script>
</body>
</html>
